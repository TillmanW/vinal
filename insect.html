<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Insect Game</title>
    <link rel="stylesheet" href="insect.css">
</head>
<body>
    <div class="screen">
        <h1>Catch The Bug</h1>
        <button class="btn" id="start-btn">Play Game</button>
    </div>
    <div class="screen">
        <h1>What is your favorite bug?</h1>
        <ul class = "insect-list">
            <li>
                <button class="choose-insect-btn">
                    <p>Dragonfly</p>
                    <img src="images/dragonfly.jfif" alt="Dragonfly">
                </button>
                <button class="choose-insect-btn">
                    <p>Praying Mantis</p>
                    <img src="images/mantis1.jfif" alt="Mantis">
                </button>
                <button class="choose-insect-btn">
                    <p>Jumping Spider</p>
                    <img src="images/spider.jfif" alt="Spider">
                </button>
                <button class="choose-insect-btn">
                    <p>Ladybug</p>
                    <img src="images/ladybug.jfif" alt="Ladybug">
                </button>
            </li>
        </ul>
    </div>


    <div class="screen game-container" id="game-container">
        <h3 id="time" class="time">Time: 00:00</h3>
        <h3 id="score" class="score">Score: 0</h3>
        <h3 id="message" class="message">One must imagine the player happy</h3>
    </div>


    <script src="insect.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Insect Game</title>
    <link rel="stylesheet" href="style/insect.css">
</head>
<body>
    <div class="screen">
        <h1>Catch The Bug</h1>
        <button class="btn" id="start-btn">Play Game</button>
        <a href="index.html">Back to Home</a>
    </div>
    <div class="screen">
        <h1>What is your favorite bug?</h1>
        <ul class = "insect-list">
            <li>
                <button class="choose-insect-btn">
                    <p>Spider</p>
                    <img src="images/spider.png" alt="Spider">
                </button>
                <button class="choose-insect-btn">
                    <p>Mosquito</p>
                    <img src="images/mosquito.png" alt="Mosquito">
                </button>
                <button class="choose-insect-btn">
                    <p>Roach</p>
                    <img src="images/roach.png" alt="Roach">
                </button>
                <button class="choose-insect-btn">
                    <p>Fly</p>
                    <img src="images/fly.png" alt="Fly">
                </button>
            </li>
        </ul>
    </div>


    <div class="screen game-container" id="game-container">
        <h3 id="time" class="time">Time: 00:00</h3>
        <h3 id="score" class="score">Score: 0</h3>
        <h3 id="message" class="message">Just give up already</h3>
    </div>


    <script src="script/insect.js"></script>
</body>
</html>
